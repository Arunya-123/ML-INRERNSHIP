<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Prediction</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Pacifico" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Arimo" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Hind:300" rel="stylesheet">

    <style>

        body {
            background: #f2f2f2;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: green;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 95%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        .prediction {
            margin-top: 20px;
            font-size: 18px;
            color: blue;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <div class="login">

        <h1>Crop Recommendation System</h1>

        <!-- Form -->
        <form action="{{ url_for('predict') }}" method="post">

            <input type="text" name="Nitrogen" placeholder="Nitrogen" required><br>

            <input type="text" name="Phosphorous" placeholder="Phosphorous" required><br>

            <input type="text" name="Pottasium" placeholder="Potassium" required><br>

            <input type="text" name="Temperature" placeholder="Temperature" required><br>

            <input type="text" name="Humidity" placeholder="Humidity" required><br>

            <input type="text" name="Ph" placeholder="pH Value" required><br>

            <input type="text" name="Rainfall" placeholder="Rainfall" required><br>

            <button type="submit">
                Predict
            </button>

        </form>

        <div class="prediction">
            {{ prediction_text }}
        </div>

    </div>

</body>

</html>
